<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agronom AI | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #143028;
        --muted: #5b756e;
        --line: rgba(20, 48, 40, 0.09);
        --primary: #2f8f5b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(47, 143, 91, 0.16), transparent 26%),
          linear-gradient(180deg, #f7f5ed, #edf4ea);
      }
      a { color: inherit; text-decoration: none; }
      .card {
        width: min(100%, 460px);
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(255,255,255,0.58);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(20, 43, 35, 0.12);
        backdrop-filter: blur(14px);
      }
      .brand {
        display: inline-flex;
        gap: 12px;
        align-items: center;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
      }
      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        color: #fff;
        background: linear-gradient(135deg, #2f8f5b, #efaa58);
      }
      h1 { margin: 18px 0 10px; font-family: "Space Grotesk", sans-serif; font-size: 2.1rem; }
      p { color: var(--muted); line-height: 1.7; }
      .form { display: grid; gap: 14px; margin-top: 18px; }
      .field {
        width: 100%;
        border-radius: 16px;
        border: 1px solid var(--line);
        padding: 14px 16px;
        font: inherit;
        color: var(--ink);
        background: rgba(255,255,255,0.84);
      }
      .btn {
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-primary {
        color: #fff;
        background: linear-gradient(135deg, var(--primary), #3aa06a);
      }
      .status {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(20,48,40,0.05);
      }
      .links {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <a class="brand" href="/index.html">
        <span class="brand-mark">AI</span>
        <span>Agronom AI</span>
      </a>
      <h1>Login</h1>
      <p>Hisobingizga kiring va alohida AI chat sahifasida o'simlik bo'yicha maslahat oling.</p>

      <form id="loginForm" class="form">
        <input id="email" class="field" type="email" placeholder="Email" />
        <input id="password" class="field" type="password" placeholder="Parol" />
        <button class="btn btn-primary" type="submit">Tizimga kirish</button>
      </form>

      <div id="statusBox" class="status">Email va parolni kiriting.</div>

      <div class="links">
        <a href="/register.html">Register</a>
        <a href="/index.html">Landing page</a>
      </div>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const statusBox = document.getElementById("statusBox");

      function setStatus(text, tone = "neutral") {
        const colors = {
          neutral: "rgba(20,48,40,0.05)",
          success: "rgba(79,186,111,0.14)",
          danger: "rgba(217,100,74,0.14)",
        };
        statusBox.textContent = text;
        statusBox.style.background = colors[tone] || colors.neutral;
      }

      async function checkSession() {
        const response = await fetch("/api/me");
        const data = await response.json();
        if (data.authenticated) {
          window.location.href = "/chat.html";
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = {
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        };

        if (!payload.email || !payload.password) {
          setStatus("Email va parol kiritilishi kerak.", "danger");
          return;
        }

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "Login bo'lmadi.");
          }
          setStatus("Login muvaffaqiyatli. Chat sahifasiga o'tilyapti...", "success");
          setTimeout(() => {
            window.location.href = "/chat.html";
          }, 500);
        } catch (error) {
          setStatus(error.message || "Xatolik yuz berdi.", "danger");
        }
      });

      checkSession().catch(() => {});
    </script>
  </body>
</html>
